<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card">
        <h1>Dhaka</h1>
        <p class="temperature">32°C</p>
        <p class="condition">☀️ Sunny</p>

        <div class="details">
            <div>
                <h3>Humidity</h3>
                <p>65%</p>
            </div>

            <div>
                <h3>Wind</h3>
                <p>12 km/h</p>
            </div>
        </div>
    </div>

</body>
</html>
